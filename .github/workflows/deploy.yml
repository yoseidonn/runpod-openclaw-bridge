name: Build and Push (Compose Edition)
on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Mapping secrets to Job-level ENVs allows the 'if' check to work
    env:
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build with Compose uses the local docker-compose.yml logic
      - name: Build with Compose
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODEL_REPO: ${{ vars.RUNPOD_MODEL_REPO }}
        run: |
          docker compose build
          docker compose push

      # Trigger RunPod Update (Optional)
      - name: Trigger RunPod Update
        if: env.RUNPOD_API_KEY != '' && env.RUNPOD_ENDPOINT_ID != ''
        run: |
          curl --request POST \
            --url https://api.runpod.ai/v2/${{ env.RUNPOD_ENDPOINT_ID }}/update \
            --header 'Authorization: Bearer ${{ env.RUNPOD_API_KEY }}' \
            --header 'Content-Type: application/json' \
            --data '{ "imageName": "ghcr.io/${{ github.repository }}:latest" }'