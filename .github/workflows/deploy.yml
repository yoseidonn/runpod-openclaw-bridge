name: Build and Push (Compose Edition)

on:
  push:
    branches: [ master ] # Triggers on push to your master branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Buildx (Modern Docker builder for faster caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build and Push using Compose
      # Compose automatically pulls variables from the 'env:' section above
      - name: Build and Push with Compose
        run: |
          docker compose build
          docker compose push

      # 4. Trigger RunPod Update (Optional)
      - name: Trigger RunPod Update
        # Explicit check for keys to avoid errors if they are missing
        if: env.RUNPOD_API_KEY != '' && env.RUNPOD_ENDPOINT_ID != ''
        run: |
          curl --request POST \
            --url https://api.runpod.ai/v2/${{ env.RUNPOD_ENDPOINT_ID }}/update \
            --header "Authorization: Bearer ${{ env.RUNPOD_API_KEY }}" \
            --header "Content-Type: application/json" \
            --data "{ \"imageName\": \"ghcr.io/${{ github.repository }}:latest\" }"